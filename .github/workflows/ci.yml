name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: 1

      - run: npm test
        env:
          SKIP_ENV_VALIDATION: 1

  migrate:
    runs-on: ubuntu-latest
    needs: build
    # Only run migrations on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Deploy database migrations
        run: ./node_modules/.bin/prisma migrate deploy
        env:
          # Use the direct (unpooled) connection — Prisma's migration engine
          # does not work correctly with connection poolers (e.g. PgBouncer/Neon pooler)
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
