name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: 1

      - run: npm test
        env:
          SKIP_ENV_VALIDATION: 1

  migrate:
    runs-on: ubuntu-latest
    needs: build
    # Only run migrations on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Deploy database migrations
        run: |
          # Attempt migrate deploy. If it fails with P3009 (failed migration),
          # resolve the failed migration and retry.
          set +e
          OUTPUT=$(./node_modules/.bin/prisma migrate deploy 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ] && echo "$OUTPUT" | grep -q "P3009"; then
            # Extract the failed migration name (e.g. "20260309010000_add_review_revisions_and_prompt_ideas")
            FAILED_NAME=$(echo "$OUTPUT" | grep -oE '[0-9]{14}_[a-zA-Z_]+' | head -1)
            if [ -n "$FAILED_NAME" ]; then
              echo "Resolving failed migration: $FAILED_NAME"
              npx prisma migrate resolve --applied "$FAILED_NAME"
              echo "Retrying migrate deploy..."
              ./node_modules/.bin/prisma migrate deploy
            else
              echo "Could not extract failed migration name"
              exit 1
            fi
          elif [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi
        env:
          # Use the direct (unpooled) connection — Prisma's migration engine
          # does not work correctly with connection poolers (e.g. PgBouncer/Neon pooler)
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
